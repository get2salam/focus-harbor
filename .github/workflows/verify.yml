name: Focus Harbor verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify static app contract
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run unit tests
        run: npm test

      - name: Syntax-check all JS sources
        run: npm run check

      - name: Verify static app contract
        run: node scripts/verify-static.mjs

      - name: Run example score preview
        run: node scripts/preview-score.mjs
